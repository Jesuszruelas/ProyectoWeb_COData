<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COData - Notificaciones</title>
    <link rel="stylesheet" href="notificaciones.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div class="main-content-wrapper">
        <header class="main-header">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar notificaciones...">
            </div>
            <a href="#" class="btn btn-admin">
                <i class="fa-solid fa-user-shield"></i>
                Admin
            </a>
        </header>

        <main class="main-content">
            <h2 class="screen-title">Notificaciones</h2>

            <div class="notifications-list">
                <!-- Las notificaciones se cargarán dinámicamente -->
                <div class="loading-spinner">Cargando...</div>
            </div>
        </main>
    </div>
</body>

</html>
